<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastDock</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top bar ── -->
  <header class="topbar">
    <span class="topbar-logo">Fast<span>Dock</span></span>
    <div class="topbar-sep"></div>

    <div class="server-selector-wrap">
      <select id="serverSelector" class="server-selector">
        <option value="local">Local</option>
      </select>

      <button id="addServerBtn" class="icon-btn" title="Add server" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      <button id="editServerBtn" class="icon-btn warn" title="Edit server" type="button" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>

      <button id="deleteServerBtn" class="icon-btn danger" title="Delete server" type="button" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Controls ── -->
  <div class="controls-row">
    <button id="sortBtn" class="pill-btn" type="button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/>
      </svg>
      <span id="sortLabel">Running first</span>
    </button>

    <button id="columnsBtn" class="pill-btn" type="button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="18"/><rect x="14" y="3" width="7" height="18"/>
      </svg>
      <span id="columnsLabel">3 cols</span>
    </button>
  </div>

  <!-- ── Container grid ── -->
  <main class="main">
    <div class="container-grid cols-3" id="containerGrid">
      <div class="state-message">Loading…</div>
    </div>
  </main>


  <!-- ═══════════════════════════════════════
       EDIT CONTAINER MODAL
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="editContainerModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Edit container</span>
        <button class="modal-close" type="button" data-close="editContainerModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="editContainerForm">
        <div class="modal-body">

          <!-- Icon preview -->
          <div class="icon-preview-row">
            <div class="icon-preview-thumb" id="iconPreviewThumb">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-3)">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
              </svg>
            </div>
            <div class="icon-preview-meta">
              <p>Container icon</p>
              <span>Upload an image or search below</span>
            </div>
            <label class="upload-link">
              Upload
              <input type="file" id="iconInput" accept="image/*" style="display:none;">
            </label>
          </div>

          <!-- Name -->
          <div>
            <label class="field-label" for="nameInput">Container name</label>
            <input type="text" id="nameInput" class="field-input" placeholder="e.g. nginx-proxy">
          </div>

          <!-- Icon search -->
          <div>
            <label class="field-label">Search icon</label>
            <div class="search-row">
              <input type="text" id="iconSearch" class="field-input" placeholder="e.g. nginx, postgres…">
              <button id="searchIconBtn" type="button" class="search-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                Search
              </button>
            </div>
            <div id="searchResults" class="icon-results" style="margin-top:10px;"></div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn-ghost" data-close="editContainerModal">Cancel</button>
          <button type="submit" class="btn-solid">Save changes</button>
        </div>
      </form>
    </div>
  </div>


  <!-- ═══════════════════════════════════════
       ADD SERVER MODAL
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="addServerModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Add server</span>
        <button class="modal-close" type="button" data-close="addServerModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="addServerForm">
        <div class="modal-body">
          <div>
            <label class="field-label" for="serverName">Name</label>
            <input type="text" id="serverName" class="field-input" placeholder="e.g. Home server" required>
          </div>
          <div>
            <label class="field-label" for="serverAddress">Address</label>
            <input type="text" id="serverAddress" class="field-input" placeholder="e.g. 192.168.1.5" required>
          </div>
          <div>
            <label class="field-label" for="serverPort">Port</label>
            <input type="number" id="serverPort" class="field-input" placeholder="e.g. 3080" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" data-close="addServerModal">Cancel</button>
          <button type="submit" class="btn-solid">Add server</button>
        </div>
      </form>
    </div>
  </div>


  <!-- ═══════════════════════════════════════
       EDIT SERVER MODAL
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="editServerModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Edit server</span>
        <button class="modal-close" type="button" data-close="editServerModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="editServerForm">
        <div class="modal-body">
          <div>
            <label class="field-label" for="editServerName">Name</label>
            <input type="text" id="editServerName" class="field-input" required>
          </div>
          <div>
            <label class="field-label" for="editServerAddress">Address</label>
            <input type="text" id="editServerAddress" class="field-input" required>
          </div>
          <div>
            <label class="field-label" for="editServerPort">Port</label>
            <input type="number" id="editServerPort" class="field-input" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" data-close="editServerModal">Cancel</button>
          <button type="submit" class="btn-solid">Save changes</button>
        </div>
      </form>
    </div>
  </div>


  <script src="script.js"></script>
</body>
</html>
